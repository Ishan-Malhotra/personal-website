<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ishan's space</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍁</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-secondary: 'Press Start 2P', cursive;
            --charcoal: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('assets/pokemon-wallpaper.webp');
            background-size: cover;
            background-position: center bottom;
            background-attachment: fixed;
            image-rendering: pixelated;
            font-family: var(--font-secondary);
            overflow: hidden;
            gap: 16px;
        }

        #game-container {
            position: relative;
            width: fit-content;
            height: fit-content;
            display: inline-block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Clean Polaroid Frame */
        .polaroid-frame {
            position: relative;
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            width: 85vw;
            max-width: 600px;
            height: 60vh;
            max-height: 600px;
            overflow: hidden;
            cursor: grab;
            touch-action: none;
        }

        #photo-track {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .photo-slide {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            padding: 16px;
            padding-bottom: 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .photo-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: 1px solid #f0f0f0;
            display: block;
        }

        .photo-slide .caption-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 16px;
        }

        .photo-slide #caption {
            color: black;
            font-size: 10px;
            line-height: 1.4;
            margin: 0;
            text-transform: uppercase;
            width: 100%;
        }

        .photo-slide #date {
            font-size: 8px;
            color: #888;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Thumbnail Navigation (Film Reel) */
        #thumbnail-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            /* Fixes left-side cutoff flexbox bug when overflowing */
            gap: 12px;
            margin: 0 auto;
            padding: 16px 20px;
            background: var(--charcoal);
            width: fit-content;
            max-width: 90vw;
            overflow-x: auto;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            /* Soften edges if it spans */
        }

        /* Subtle scrollbar for desktop overflow */
        #thumbnail-nav::-webkit-scrollbar {
            height: 6px;
        }

        #thumbnail-nav::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        #thumbnail-nav::before,
        #thumbnail-nav::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 8px;
            background: repeating-linear-gradient(90deg,
                    #000 0,
                    #000 8px,
                    transparent 8px,
                    transparent 16px);
        }

        #thumbnail-nav::before {
            top: 4px;
        }

        #thumbnail-nav::after {
            bottom: 4px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border: 2px solid #555;
            cursor: pointer;
            object-fit: cover;
            transition: filter 0.3s, border-color 0.3s, transform 0.2s;
            border-radius: 2px;
            filter: grayscale(100%);
            position: relative;
            z-index: 2;
        }

        .thumbnail:hover {
            transform: scale(1.05);
            border-color: #888;
        }

        .thumbnail.active {
            filter: grayscale(0%);
            border-color: #00ff00;
        }

        /* HUD Bar */
        #desktop-controls-hud {
            position: fixed;
            bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: fit-content;
            padding: 12px 32px;
            background: rgba(26, 26, 26, 0.95);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        #back-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            background: rgba(26, 26, 26, 0.9);
            color: white;
            border: 2px solid white;
            padding: 12px 24px;
            font-family: var(--font-secondary);
            font-size: 10px;
            cursor: pointer;
            z-index: 100;
            border-radius: 4px;
            transition: all 0.2s;
        }

        #back-btn:hover {
            background: white;
            color: black;
            transform: scale(1.05);
        }

        /* --- LIGHTBOX (ZOOM) STATES --- */
        #zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            /* Ignore clicks natively */
            z-index: 50;
            /* Above wallpaper and map, beneath game-container */
            transition: opacity 0.3s ease;
        }

        /* Triggered dynamically by gallery.js */
        body.zoomed-in #zoom-overlay {
            opacity: 1;
            pointer-events: all;
        }

        body.zoomed-in .polaroid-frame {
            overflow: visible;
            /* Let the expanded image burst out! */
            background: transparent;
            box-shadow: none;
        }

        body.zoomed-in .caption-container,
        body.zoomed-in #thumbnail-nav,
        body.zoomed-in #back-btn,
        body.zoomed-in #desktop-controls-hud {
            opacity: 0 !important;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        body.zoomed-in #game-container {
            z-index: 150;
            /* Bring it above the zoom overlay */
            position: relative;
        }

        .photo-slide img {
            border: 1px solid #f0f0f0;
            background: linear-gradient(180deg, #0d0d0d 0%, #1c1510 100%);
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            transform-origin: center center;
        }

        /* When actively manipulating via multi-touch, kill transition lag */
        .photo-slide img.dragging {
            transition: none !important;
        }

        body.zoomed-in .photo-slide img {
            border: none;
            /* Remove polaroid print border on zoom */
        }

        @media (max-width: 768px) {
            body {
                height: 100dvh;
                gap: 0;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 10px;
                box-sizing: border-box;
                background-position: center center;
            }

            #thumbnail-nav {
                width: 100%;
                max-width: 90vw;
                box-sizing: border-box;
                border-radius: 4px 4px 0 0;
                justify-content: flex-start;
                /* CRITICAL FIX: Stops flexbox from clipping left edges when overflowing */
                overflow-x: auto;
                padding: 14px 16px;
                margin: 0;
            }

            .thumbnail {
                width: 45px;
                height: 45px;
                flex-shrink: 0;
            }

            #game-container {
                width: 100%;
                max-width: 90vw;
                height: 55vh;
                /* Strict locked height to prevent slide shifting */
                display: block;
            }

            .polaroid-frame {
                width: 100%;
                height: 100%;
                max-width: none;
                max-height: none;
                border-radius: 0 0 4px 4px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
                background: #ffffff;
                padding: 0;
            }

            #photo-track {
                height: 100%;
            }

            .photo-slide {
                padding: 12px;
                padding-bottom: 76px;
                width: 100%;
                height: 100%;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                position: relative;
            }

            .photo-slide img {
                border: 1px solid #f0f0f0;
                background: linear-gradient(180deg, #0d0d0d 0%, #1c1510 100%);
                width: 100%;
                height: 100%;
                object-fit: contain;
                display: block;
            }

            .photo-slide .caption-container {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 76px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background: transparent;
            }

            .photo-slide #caption {
                color: black;
                text-shadow: none;
            }

            .photo-slide #date {
                color: #888;
                text-shadow: none;
            }

            #back-btn {
                position: fixed;
                top: 15px;
                left: 15px;
                padding: 10px 16px;
                font-size: 10px;
                background: rgba(26, 26, 26, 0.9);
                backdrop-filter: blur(5px);
                border-radius: 4px;
            }

            #desktop-controls-hud {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Fullscreen Lightbox Backdrop -->
    <div id="zoom-overlay"></div>

    <button id="back-btn">← BACK [ESC]</button>

    <div id="thumbnail-nav"></div>

    <div id="game-container">
        <div class="polaroid-frame" id="polaroid-frame" style="border-top-left-radius: 0; border-top-right-radius: 0;">
            <div id="photo-track">
                <!-- Slides injected via JS -->
            </div>
        </div>
    </div>

    <!-- Desktop minimalist control bar -->
    <div id="desktop-controls-hud">
        <span>CONTROLS: ← →</span>
    </div>

    <script src="gallery.js"></script>
</body>

</html>
