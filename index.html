<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ishan's space</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍁</text></svg>">
    <link rel="stylesheet" href="src/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        /* ─── Music Player Card ─── */
        #music-player-popup {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 900;
            width: 284px;
            background: #111;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.85),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            font-family: 'Press Start 2P', cursive;
        }

        /* Header row */
        #music-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px 8px 12px;
        }

        #music-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #music-note-anim {
            font-size: 13px;
            color: #1DB954;
            display: inline-block;
            animation: noteBounce 0.65s ease-in-out infinite alternate;
            line-height: 1;
        }

        @keyframes noteBounce {
            from {
                transform: translateY(0) rotate(-10deg) scale(1);
            }

            to {
                transform: translateY(-5px) rotate(10deg) scale(1.12);
            }
        }

        #music-header-title {
            font-size: 6px;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Close button */
        #close-music-btn {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 9px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        #close-music-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        /* Spotify embed — flush, no gaps */
        #spotify-embed-frame {
            display: block;
            width: 100%;
            height: 160px;
            border: none;
        }

        /* Bottom row */
        #music-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 7px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Small circular Spotify logo */
        #spotify-open-btn {
            background: #1DB954;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            flex-shrink: 0;
        }

        #spotify-open-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.6);
        }

        #spotify-open-btn:active {
            transform: scale(0.93);
        }

        #spotify-open-btn svg {
            width: 13px;
            height: 13px;
            display: block;
        }

        /* ─── Mobile override: embed is part of the console ─── */
        @media (max-width: 768px) {
            #music-player-popup {
                display: none !important;
            }
        }
    </style>

</head>

<body>
    <div id="dev-tooltip"></div>

    <div id="game-container">
        <canvas id="game-canvas" width="320" height="320"></canvas>
        <div id="transition-overlay"></div>
    </div>

    <!-- Desktop minimalist control bar -->
    <div id="desktop-controls-hud">
        <span>CONTROLS: Use ARROW KEYS or WASD to move</span>
        <span class="sub-text">Walk into buildings to explore</span>
    </div>

    <div id="reading-window" class="hidden">
        <div class="content">
            <h2 id="window-title">Welcome</h2>
            <p id="window-text">Select an option to continue...</p>
            <button id="close-btn">Close</button>
        </div>
    </div>

    <!-- Editor Tools -->
    <button id="add-label-btn"
        style="position:fixed; top:70px; left:10px; z-index:1000; display:none; padding:10px; font-family:'Press Start 2P'; cursor:pointer;">Add
        Label</button>
    <button id="export-btn"
        style="position:fixed; bottom:10px; right:10px; padding:10px; font-family:'Press Start 2P'; cursor:pointer; z-index:1000; display:none;">Export
        Config</button>

    <!-- ── Music Player Card ── -->
    <div id="music-player-popup" class="hidden">

        <!-- Header: ♪ note + title + close -->
        <div id="music-header">
            <div id="music-header-left">
                <span id="music-note-anim">♪</span>
                <span id="music-header-title">WELCOME TO LIMINAL SPACE</span>
            </div>
            <button id="close-music-btn" aria-label="Close">✕</button>
        </div>

        <!-- Spotify embed — dark theme, native controls -->
        <iframe id="spotify-embed-frame"
            src="https://open.spotify.com/embed/playlist/7C6Ex5Rah9aCJxBHNxscch?utm_source=generator&theme=0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
        </iframe>

        <!-- Footer: Spotify logo link -->
        <div id="music-footer">
            <a id="spotify-open-btn" href="https://open.spotify.com/playlist/7C6Ex5Rah9aCJxBHNxscch" target="_blank"
                rel="noopener" title="Open playlist in Spotify">
                <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.509 17.31a.748.748 0 01-1.03.25c-2.822-1.725-6.373-2.115-10.56-1.16a.748.748 0 01-.33-1.46c4.578-1.045 8.504-.596 11.672 1.34a.748.748 0 01.248 1.03zm1.47-3.267a.936.936 0 01-1.287.308c-3.23-1.985-8.155-2.561-11.974-1.401a.935.935 0 01-.541-1.79c4.366-1.326 9.79-.683 13.494 1.597a.936.936 0 01.308 1.286zm.126-3.401c-3.874-2.3-10.265-2.511-13.963-1.39a1.122 1.122 0 11-.65-2.149c4.246-1.287 11.3-1.038 15.762 1.607a1.122 1.122 0 11-1.15 1.932z" />
                </svg>
            </a>
        </div>
    </div>

    <script>
        document.getElementById('close-music-btn').addEventListener('click', () => {
            document.getElementById('music-player-popup').classList.add('hidden');
        });
    </script>

    <script src="./src/mobileAdapter.js"></script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
