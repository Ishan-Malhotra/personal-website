<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ishan's space</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍁</text></svg>">
    <link rel="stylesheet" href="src/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <div id="dev-tooltip"></div>

    <div id="game-container">
        <canvas id="game-canvas" width="320" height="320"></canvas>
        <div id="transition-overlay"></div>
    </div>

    <!-- Desktop minimalist control bar -->
    <div id="desktop-controls-hud">
        <span>CONTROLS: Use ARROW KEYS or WASD to move</span>
        <span class="sub-text">Walk into buildings to explore</span>
    </div>


    <div id="reading-window" class="hidden">
        <div class="content">
            <h2 id="window-title">Welcome</h2>
            <p id="window-text">Select an option to continue...</p>
            <button id="close-btn">Close</button>
        </div>
    </div>



    <!-- Editor Tools -->
    <button id="add-label-btn"
        style="position:fixed; top:70px; left:10px; z-index:1000; display:none; padding: 10px; font-family: 'Press Start 2P'; cursor: pointer;">Add
        Label</button>
    <button id="export-btn"
        style="position: fixed; bottom: 10px; right: 10px; padding: 10px; font-family: 'Press Start 2P'; cursor: pointer; z-index: 1000; display: none;">Export
        Config</button>

    <script src="./src/mobileAdapter.js"></script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
